<!DOCTYPE html>
<html lang="en" class="obsidian-tempest">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#010103" />
    
    <title>Priyanshu Roy | AI & ML Security Architect</title>
    <meta name="description" content="Portfolio of Priyanshu Roy: Engineering secure, explainable, and crash-resilient Edge AI architectures." />
    <meta name="keywords" content="AI Security, Machine Learning, RAG, Edge AI, Priyanshu Roy, Cybersecurity" />
    <meta name="author" content="Priyanshu Roy" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/styles/global.css" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐉%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🐉%3C/text%3E%3C/svg%3E" />

    <style>
      /* Critical Render Path Styles - Keeps layout stable before global.css loads */
      body {
        margin: 0;
        background: #010103; 
        overflow-x: hidden;
      }

      /* WebGL Canvas – fullscreen, locked to dynamic viewport */
      #webgl-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; 
        height: 100dvh; /* Natively fixes mobile address bar jumps */
        display: block;
        z-index: 0;
        pointer-events: none; 
        outline: none;
      }

      /* UI Container – above canvas */
      #scroll-container {
        position: relative;
        z-index: 10;
        background: transparent;
        pointer-events: auto; 
      }

      /* Streamlined Global Loader */
      .loader-overlay {
        position: fixed; inset: 0;
        background: #010103;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease-out; /* Sped up the fade out */
        pointer-events: all;
      }

      .loader-content {
        text-align: center;
        font-family: 'Cinzel', serif;
        color: #00ffff; 
      }

      .magitech-spinner {
        width: 50px; height: 50px;
        margin: 0 auto 20px;
        border: 3px solid rgba(0, 255, 255, 0.1);
        border-top: 3px solid #00ffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loader-text {
        font-size: 1.2rem;
        letter-spacing: 4px;
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        margin: 0;
      }

      .no-webgl-message {
        display: none; position: fixed; bottom: 20px; left: 20px;
        background: rgba(10,5,5,0.9); color: #ff3300; padding: 10px 15px;
        border: 1px solid #ff3300; border-radius: 4px;
        font-family: monospace; z-index: 10000; font-size: 12px;
      }
    </style>
  </head>
  
  <body>
    <div id="global-loader" class="loader-overlay">
      <div class="loader-content">
        <div class="magitech-spinner"></div>
        <h2 class="loader-text">LOADING...</h2>
      </div>
    </div>

    <canvas id="webgl-canvas" class="webgl-canvas" aria-label="3D Dragon Animation Canvas" role="img"></canvas>

    <main id="scroll-container" class="ui-container">
      <section id="intro" class="viewport-section"></section>
      <!-- <section id="work-experience" class="viewport-section"></section> -->
      <!-- <section id="certificates" class="viewport-section"></section> -->
      <section id="skills" class="viewport-section"></section>
      <section id="projects" class="viewport-section"></section>
      <section id="about" class="viewport-section"></section>
      <section id="contact" class="viewport-section"></section>
      
      <footer id="global-ui" class="fixed-ui"></footer>
    </main>

    <div id="webgl-announcer" class="sr-only" aria-live="polite"></div>

    <div id="webgl-fallback-message" class="no-webgl-message">
      [WARNING] WebGL not supported. Running in restricted 2D fallback mode.
    </div>

    <script type="module" src="/src/main.js"></script>
    
    <script>
      (function() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) {
          const msg = document.getElementById('webgl-fallback-message');
          if (msg) msg.style.display = 'block';
        }
      })();
    </script>
  </body>
</html>
